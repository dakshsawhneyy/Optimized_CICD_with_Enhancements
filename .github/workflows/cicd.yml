name: Optimized CICD Pipeline

on: 
  workflow_dispatch: 
    inputs:
      env:
        default: 'staging'
        type: choice
        options:
          - prod
          - staging
          - dev
      version:
        default: 'v1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Installing NodeJS
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22

      - name: Introducing Caching
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
      
      - name: Install Dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t myapp:${{ github.event.inputs.version }} .

      - name: Deploying
        run: echo "Deploying to environment ${{ github.event.inputs.env }}"

      - name: Notifying Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"Build Completed!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Handling Failures
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"Build Failed!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run Tests
        run: echo "No Tests yet"
